<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册与登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="auth-container" id="authContainer">
            <!-- 登录表单 -->
            <div class="form-container" id="loginFormContainer">
                <h2>用户登录</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginUsername">用户名:</label>
                        <input type="text" id="loginUsername" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">密码:</label>
                        <input type="password" id="loginPassword" name="password" required>
                    </div>
                    <button type="submit">登录</button>
                </form>
                <p>还没有账号？<a href="#" id="showRegister">立即注册</a></p>
            </div>

            <!-- 注册表单 -->
            <div class="form-container" id="registerFormContainer" style="display: none;">
                <h2>用户注册</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regUsername">用户名:</label>
                        <input type="text" id="regUsername" name="username" required>
                        <small>用户名必须唯一，长度3-20个字符</small>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">密码:</label>
                        <input type="password" id="regPassword" name="password" required>
                        <small>密码长度至少6位</small>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">确认密码:</label>
                        <input type="password" id="confirmPassword" name="confirm_password" required>
                    </div>
                    <button type="submit">注册</button>
                </form>
                <p>已有账号？<a href="#" id="showLogin">立即登录</a></p>
            </div>
            
            <div id="message" class="message"></div>
        </div>
        
        <!-- 用户信息面板 -->
        <div id="userPanel" class="user-panel" style="display: none;">
            <h2>用户信息</h2>
            <div id="userInfo">
                <p><strong>用户名:</strong> <span id="userUsername"></span></p>
                <p><strong>注册时间:</strong> <span id="userCreatedAt"></span></p>
            </div>
            
            <div class="button-group">
                <button id="logoutBtn" class="logout">退出登录</button>
            </div>
            
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
